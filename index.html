<!DOCTYPE html>
<html>
<head>
<title>?</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    overflow:hidden;
}

h1{
    margin-top:120px;
    color:white;
}

button{ 
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:white;
}

#no{
    background:#ff4d6d;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>meli baby khana kayii ? ❤️</h1>

<button id="yes" onclick="yesClick()">Yes</button>
<button id="no" onmouseover="moveButton()">No</button>

<h2 id="msg"></h2>

<script>

function yesClick(){
    document.getElementById("msg").innerHTML =
    "Yay! I knew it 😊";
}

function moveButton(){
    let x = Math.random()*window.innerWidth;
    let y = Math.random()*window.innerHeight;

    let btn = document.getElementById("no");
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

</script>

</body>
</html>
